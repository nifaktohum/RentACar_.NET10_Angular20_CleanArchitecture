<!-- category-form-dialog.component.html -->

<!-- ✅ DIALOG MODU -->
@if (mode() === 'dialog') {
<p-dialog [header]="dialogTitle" [(visible)]="visible" (visibleChange)="close()" [modal]="true" [draggable]="false"
  [resizable]="false" class="modern-dialog">
  <div class="modern-form-container">
    <ng-container *ngTemplateOutlet="formTemplate"></ng-container>
  </div>
</p-dialog>
}

<!-- ✅ SAYFA MODU -->
@if (mode() === 'page') { <!-- ← DÜZELTİLDİ! -->
<div class="page-form-container">
  <div class="page-header">
    <h2>
      <i class="ri-add-circle-line"></i>
      {{ dialogTitle }}
    </h2>
    <p>Araç kategorisi oluşturun ve hiyerarşik yapıda düzenleyin.</p>
  </div>
  <div class="page-body">
    <ng-container *ngTemplateOutlet="formTemplate"></ng-container>
  </div>
</div>
}

<!-- ✅ ORTAK FORM TEMPLATE -->
<ng-template #formTemplate>
  <!-- Kategori Tipi -->
  @if (!isEditMode) {
  <div class="field-container">
    <label class="field-label">Kategori Tipi</label>
    <div class="p-button-group">
      <button pButton label="Ana Kategori" icon="ri-folder-line" [class.p-button-primary]="!isSubCategoryMode()"
        [class.p-button-outlined]="isSubCategoryMode()" (click)="setParentCategoryMode()">
      </button>
      <button pButton label="Alt Kategori" icon="ri-folder-add-line" [class.p-button-primary]="isSubCategoryMode()"
        [class.p-button-outlined]="!isSubCategoryMode()" (click)="setSubCategoryMode()">
      </button>
    </div>
  </div>
  }

  <!-- Kategori Adı -->
  <p-floatlabel variant="on">
    <input id="name" pInputText [(ngModel)]="categoryForm.name" autocomplete="off" placeholder="" />
    <label for="name">Kategori Adı *</label>
  </p-floatlabel>

  <!-- Slug -->
  <p-floatlabel variant="on">
    <input id="slug" pInputText [(ngModel)]="categoryForm.slug" autocomplete="off" placeholder=""
      (input)="onNameSlugChange()" />
    <label for="slug">Slug *</label>
  </p-floatlabel>

  <!-- Açıklama -->
  <p-floatlabel variant="on">
    <input id="description" pInputText [(ngModel)]="categoryForm.description" autocomplete="off" placeholder="" />
    <label for="description">Açıklama</label>
  </p-floatlabel>

  <!-- Görüntüleme Sırası -->
  <p-floatlabel variant="on">
    <input id="displayOrder" pInputText type="number" [min]="0" [(ngModel)]="categoryForm.displayOrder"
      autocomplete="off" placeholder="" />
    <label for="displayOrder">Görüntüleme Sırası</label>
  </p-floatlabel>

  <!-- Üst Kategori -->
  @if (isSubCategoryMode()) {
  <p-floatlabel variant="on">
    <p-select [options]="parentCategories()" optionLabel="name" optionValue="id" appendTo="body"
      [(ngModel)]="categoryForm.parentCategoryId" placeholder="" [showClear]="true">
      <ng-template pTemplate="selectedItem" let-item>
        {{ item ? item.name : 'Üst Kategori Seçiniz' }}
      </ng-template>
    </p-select>
    <label>Üst Kategori</label>
  </p-floatlabel>
  }

  <!-- Aktiflik -->
  <div class="form-toggle">
    <label>{{ categoryForm.isActive ? '✅ Aktif' : '❌ Pasif' }}</label>
    <p-toggleSwitch [(ngModel)]="categoryForm.isActive"></p-toggleSwitch>
  </div>

  <!-- Form Actions -->
  <div class="form-actions">
    @if (mode() === 'dialog') {
    <button pButton label="İptal" icon="ri-close-line" class="p-button-text p-button-secondary" (click)="closeDialog()">
    </button>
    }
    <button pButton label="Kaydet" icon="ri-save-line" class="p-button-raised p-button-primary" [loading]="isLoading()"
      (click)="saveCategory()">
    </button>
  </div>
</ng-template>
